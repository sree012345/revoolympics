# Placeholder
name: Firebase Functions Test
on:
  pull_request:
    paths: ['firebase/functions/**']
  workflow_dispatch
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: cd firebase/functions && npm ci && npm test
