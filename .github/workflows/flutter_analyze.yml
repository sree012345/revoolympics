# Placeholder — full CI in later sprint
name: Flutter Analyze

on:
  pull_request:
    paths:
      - 'apps/**'
      - 'melos.yaml'
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: dart pub global activate melos
      - run: melos bootstrap
      - run: melos run analyze
